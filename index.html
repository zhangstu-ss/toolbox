<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>番茄时钟</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <button class="theme-toggle" id="themeToggle" aria-label="切换深浅色模式">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <div class="timer-stage">
        <div class="clock">
          <svg class="ring" viewBox="0 0 300 300">
            <circle class="ring-bg" cx="150" cy="150" r="130" />
            <circle class="ring-progress" id="ringProgress" cx="150" cy="150" r="130" />
          </svg>
          <div class="time-display">
            <span class="mode-badge" id="modeBadge">专注</span>
            <span class="time-readout" id="timeReadout">25:00</span>
          </div>
        </div>

        <div class="mode-tabs" id="modeTabs">
          <button class="mode-tab is-active" data-mode="work">专注</button>
          <button class="mode-tab" data-mode="short">短休息</button>
          <button class="mode-tab" data-mode="long">长休息</button>
        </div>

        <div class="controls">
          <button class="btn-primary" id="startPauseButton">开始</button>
          <button class="btn-ghost" id="resetButton" title="重置">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
          <button class="btn-ghost" id="skipButton" title="跳过">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 4 15 12 5 20 5 4"/>
              <line x1="19" y1="5" x2="19" y2="19"/>
            </svg>
          </button>
        </div>

        <div class="stats">
          <span class="stat" id="sessionCount">已完成 0 个番茄</span>
          <span class="stat-divider"></span>
          <span class="stat" id="soundToggle" role="button" tabindex="0">声音开</span>
        </div>
      </div>

      <div class="settings" id="settings">
        <button class="settings-trigger" id="settingsTrigger">
          设置
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="settings-body" id="settingsBody">
          <label class="setting-row">
            <span>专注时长（分钟）</span>
            <input id="workInput" type="number" min="1" max="120" value="25" />
          </label>
          <label class="setting-row">
            <span>短休息时长（分钟）</span>
            <input id="shortInput" type="number" min="1" max="60" value="5" />
          </label>
          <label class="setting-row">
            <span>长休息时长（分钟）</span>
            <input id="longInput" type="number" min="1" max="90" value="15" />
          </label>
          <label class="setting-row">
            <span>长休息间隔（轮次）</span>
            <input id="intervalInput" type="number" min="2" max="12" value="4" />
          </label>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
