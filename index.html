<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>番茄时钟工作台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app">
      <section class="home-view" id="homeView" aria-labelledby="homeTitle">
        <div class="home-heading">
          <p class="kicker">Pomodoro Studio</p>
          <h1 id="homeTitle">选择一种节奏，开始一个番茄钟</h1>
          <p class="intro">六种专注场景，每一种都能进入完整计时器。</p>
        </div>
        <div class="style-grid" id="styleGrid"></div>
      </section>

      <section class="timer-view is-hidden" id="timerView" aria-labelledby="timerTitle">
        <header class="timer-topbar">
          <button class="ghost-button" id="backButton" type="button">返回首页</button>
          <div class="topbar-title">
            <p class="kicker" id="timerTone">Focus Session</p>
            <h1 id="timerTitle"></h1>
          </div>
          <button class="ghost-button" id="soundButton" type="button">声音开</button>
        </header>

        <div class="timer-layout">
          <section class="timer-stage" aria-label="番茄时钟">
            <div class="scene" id="scene" aria-hidden="true">
              <span class="scene-orbit scene-orbit-a"></span>
              <span class="scene-orbit scene-orbit-b"></span>
              <span class="scene-mark scene-mark-a"></span>
              <span class="scene-mark scene-mark-b"></span>
            </div>

            <div class="mode-tabs" id="modeTabs" role="tablist" aria-label="计时模式"></div>

            <div class="clock-shell">
              <svg class="progress-ring" viewBox="0 0 220 220" aria-hidden="true">
                <circle class="ring-bg" cx="110" cy="110" r="96"></circle>
                <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="96"></circle>
              </svg>
              <div class="time-stack">
                <p id="modeLabel">专注</p>
                <div class="time-readout" id="timeReadout">25:00</div>
                <p id="sessionText">已完成 0 个番茄</p>
              </div>
            </div>

            <div class="control-row">
              <button class="primary-button" id="startPauseButton" type="button">开始</button>
              <button class="secondary-button" id="resetButton" type="button">重置</button>
              <button class="secondary-button" id="skipButton" type="button">跳过</button>
            </div>
          </section>

          <aside class="settings-panel" aria-label="设置">
            <div>
              <p class="panel-label">当前风格</p>
              <h2 id="styleName"></h2>
              <p id="styleDescription"></p>
            </div>

            <div class="setting-list">
              <label>
                <span>专注</span>
                <input id="workInput" type="number" min="1" max="120" value="25" />
              </label>
              <label>
                <span>短休息</span>
                <input id="shortInput" type="number" min="1" max="60" value="5" />
              </label>
              <label>
                <span>长休息</span>
                <input id="longInput" type="number" min="1" max="90" value="15" />
              </label>
              <label>
                <span>长休间隔</span>
                <input id="intervalInput" type="number" min="2" max="12" value="4" />
              </label>
            </div>

            <div class="stat-strip">
              <div>
                <span id="currentRound">1</span>
                <p>当前轮次</p>
              </div>
              <div>
                <span id="nextBreak">短休息</span>
                <p>下一阶段</p>
              </div>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
